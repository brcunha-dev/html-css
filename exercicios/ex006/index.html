<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens adaptaveis</title>
</head>
<body>
    <h1>Imagem dinámica</h1>
    <p>Teste abrir esse site em diferentes dispositivos.</p>

    <picture>
        <source media="(max-width: 750px)" srcset="assets/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="assets/foto-m.png" type="image/png">
        <img src="assets/foto-g.png" alt="Foto Grande">
    </picture>

    <h1>Reproduzindo audio</h1>
    <p>Aprendendo a reproduzir audio em HTML</p>
    <audio src="audio/som.mp3" controls></audio>

    <h1>Reproduzindo vídeos</h1>
    <p>Adicionando vídeos</p>
    <video src="audio/video.mp4" width="300px" controls autoplay></video>
    <iframe width="300" height="300" src="https://www.youtube.com/embed/uX-4TqjDhz0?si=7OWqfTLVqFU4z0MA" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <a href="audio/video.mp4" download>Baixar vídeo</a>
</body>
</html>
